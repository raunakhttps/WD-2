<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prime Number Checker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            width:350px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
        }

        h1{
            color:#0077cc;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            font-size:18px;
            border:2px solid #0077cc;
            border-radius:8px;
            outline:none;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            font-size:18px;
            background:#0077cc;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#005fa3;
            transform:scale(1.05);
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Prime Number Checker</h1>

    <input type="number" id="num" placeholder="Enter a Number">

    <button onclick="checkPrime()">Check</button>

    <p id="result"></p>

</div>

<script>

function checkPrime()
{
    let n = parseInt(document.getElementById("num").value);
    let prime = true;

    if(isNaN(n))
    {
        document.getElementById("result").innerHTML="Please enter a number!";
        document.getElementById("result").style.color="red";
        return;
    }

    if(n<=1)
    {
        prime=false;
    }
    else
    {
        for(let i=2;i<n;i++)
        {
            if(n%i==0)
            {
                prime=false;
                break;
            }
        }
    }

    if(prime)
    {
        document.getElementById("result").innerHTML="✅ "+n+" is a Prime Number";
        document.getElementById("result").style.color="green";
    }
    else
    {
        document.getElementById("result").innerHTML="❌ "+n+" is Not a Prime Number";
        document.getElementById("result").style.color="red";
    }
}

</script>

</body>
</html>
